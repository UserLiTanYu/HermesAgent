# 默认模型：MiMO v2.5 Pro（小米 Token Plan，OpenAI 兼容端点）
# - key 从环境变量 OPENAI_API_KEY 读取（见 workspace/.env）
# - base_url 走小米 MiMO Token Plan 端点
model:
  provider: custom
  default: mimo-v2.5-pro
  base_url: https://token-plan-cn.xiaomimimo.com/v1

platforms:
  api_server:
    port: 8642
    enabled: true
mcp_servers: {}
